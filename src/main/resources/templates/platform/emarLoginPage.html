<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이마트 로그인</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="d-flex justify-content-center align-items-center vh-100">
        <div class="w-100 p-4 p-md-5 border bg-white rounded-3 shadow" style="max-width: 466px;">

            <div class="text-center mb-5">
                <h3 class="m-0 fw-bold" style="color: #0046ab;">EMART</h3>
            </div>

            <!-- 로그인 폼 -->
            <form id="loginForm">
                <div class="mb-3">
                    <input type="text" id="accountName" name="accountName"
                           class="form-control form-control-lg border-0 border-bottom rounded-0"
                           placeholder="아이디" required>
                </div>

                <div class="mb-4">
                    <input type="password" id="userPassword" name="userPassword"
                           class="form-control form-control-lg border-0 border-bottom rounded-0"
                           placeholder="비밀번호" required>
                </div>

                <!-- 에러 메시지 표시 영역 -->
                <div id="errorMessage" class="alert alert-danger d-none mb-3"></div>

                <div class="d-grid mb-4">
                    <button type="submit" class="btn btn-primary btn-lg" style="background-color: #0046ab;">
                        로그인
                    </button>
                </div>
            </form>

            <div class="text-center mb-3">
                <span class="text-muted">또는</span>
            </div>

            <!-- 판매자 로그인 링크 -->
            <div class="d-grid mb-3">
                <a th:href="@{/user/useTerms2}" class="btn btn-outline-success">
                    판매자 ID로 로그인
                </a>
            </div>

            <!-- 관리자 로그인 링크 -->
            <div class="d-grid mb-3">
                <a th:href="@{/user/adminRegisterPage}" class="btn btn-outline-secondary">
                    관리자 회원가입
                </a>
            </div>

            <div class="d-flex justify-content-center gap-3 mt-4">
                <a href="/emartUser/registerPage" class="text-decoration-none text-secondary small">회원가입</a>
                <span class="text-muted">|</span>
                <a href="#" class="text-decoration-none text-secondary small">아이디 찾기</a>
                <span class="text-muted">|</span>
                <a href="#" class="text-decoration-none text-secondary small">비밀번호 찾기</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const accountName = document.getElementById('accountName').value;
            const userPassword = document.getElementById('userPassword').value;
            const errorDiv = document.getElementById('errorMessage');

            // 에러 메시지 숨기기
            errorDiv.classList.add('d-none');

            try {
                const formData = new URLSearchParams();
                formData.append('accountName', accountName);
                formData.append('userPassword', userPassword);

                const response = await fetch('/emartUser/loginProcess', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: formData.toString()
                });

                const data = await response.json();

                if (data.success) {
                    // 로그인 성공 시 메인 페이지로 이동
                    window.location.href = '/user/mainPage';
                } else {
                    // 로그인 실패 시 에러 메시지 표시
                    errorDiv.textContent = data.message;
                    errorDiv.classList.remove('d-none');
                }
            } catch (error) {
                console.error('로그인 오류:', error);
                errorDiv.textContent = '로그인 처리 중 오류가 발생했습니다.';
                errorDiv.classList.remove('d-none');
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
