<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원 가입</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4 p-md-5">
                        <h1 class="text-center mb-4">회원 가입</h1>
                        <p class="text-center text-muted mb-4">간단한 정보 입력으로 서비스를 이용해보세요</p>

                        <form action="/emartUser/registerProcess" method="post">
                            <!-- 이름 -->
                            <div class="mb-3">
                                <label for="name" class="form-label">이름</label>
                                <input type="text" class="form-control" name="name" placeholder="이름" required>
                            </div>

                            <!-- 아이디 -->
                            <div class="mb-3">
                                <label for="userId" class="form-label">아이디</label>
                                <input type="text" class="form-control" name="userId" placeholder="아이디" required>
                            </div>

                            <!-- 비밀번호 -->
                            <div class="mb-3">
                                <label for="userPassword" class="form-label">비밀번호</label>
                                <input type="password" class="form-control" name="userPassword" placeholder="비밀번호" required>
                            </div>

                            <!-- 비밀번호 확인 -->
                            <div class="mb-3">
                                <label for="userPasswordConfirm" class="form-label">비밀번호 확인</label>
                                <input type="password" class="form-control" name="userPasswordConfirm" placeholder="비밀번호 확인" required>
                            </div>

                            <!-- 이메일 -->
                            <div class="mb-3">
                                <label for="email" class="form-label">이메일</label>
                                <input type="email" class="form-control" name="email" placeholder="example@email.com" required>
                            </div>

                            <!-- 성별 -->
                            <div class="mb-3">
                                <label class="form-label">성별</label>
                                <div class="d-flex gap-3">
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="gender" id="genderMale" value="male" required>
                                        <label class="form-check-label" for="genderMale">남성</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="gender" id="genderFemale" value="female">
                                        <label class="form-check-label" for="genderFemale">여성</label>
                                    </div>
                                </div>
                            </div>

                            <!-- 생년월일 -->
                            <div class="mb-3">
                                <label for="birth" class="form-label">생년월일</label>
                                <input type="date" class="form-control" name="birth" required>
                            </div>

                            <!-- 전화번호 -->
                            <div class="mb-3">
                                <label for="phone" class="form-label">전화번호</label>
                                <input type="tel" class="form-control" name="phone" placeholder="010-0000-0000" required>
                            </div>

                            <!-- 약관 동의 -->
                            <div class="mb-4">
                                <div class="form-check">
                                    <input type="checkbox" name="useTerms" value="Y" id="useTerms" required>
                                    <label class="form-check-label" for="useTerms">이용약관 및 개인정보처리방침에 동의합니다</label>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg w-100 mb-3">회원 가입</button>

                            <div class="text-center">
                                <span class="text-muted">이미 계정이 있으신가요?</span>
                                <a href="/emartUser/loginPage" class="text-decoration-none fw-bold">로그인</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
