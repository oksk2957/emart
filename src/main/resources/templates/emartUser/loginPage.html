<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAVER 로그인</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <!-- Flexbox를 사용해 로그인 박스를 화면 수직/수평 중앙에 배치 -->
    <div class="d-flex justify-content-center align-items-center vh-100">

        <!-- 로그인 폼을 감싸는 박스 -->
        <div class="w-100 p-4 p-md-5 border bg-white rounded-3 shadow" style="max-width: 466px;">
            
            <!-- 네이버 로고 영역 -->
            <div class="text-center mb-5">
                <a href="#" target="_blank" class="text-decoration-none">
                    <h3 class="m-0 fw-bold text-success">NAVER</h3>
                </a>
            </div>

            <form action="/emartUser/loginProcess" method="post">
                <!-- 로그인 종류 선택 -->
                <label class="text-start">
                    <input type="checkbox" id="sellerChk" class="me-2" onclick="selectLogin('seller')">
                    <label for="sellerChk" class="flex-grow-1">
                        판매자 아이디로 로그인
                    </label>
                </label>
                
                <div class="mb-3">
                    이미 네이버 커머스 ID 회원이신가요? 
                    <a th:href="@{/emartUser/useTerms}">판매자ID 로그인하기</a>
                </div>

                <!-- 아이디 입력 필드 -->
                <div class="mb-3">
                    <label for="userId" class="visually-hidden">아이디</label>
                    <input type="text" id="userId" name="userId" class="form-control form-control-lg border-0 border-bottom rounded-0"
                           placeholder="아이디" aria-label="아이디">
                </div>

                <!-- 비밀번호 입력 필드 -->
                <div class="mb-4">
                    <label for="userPassword" class="visually-hidden">비밀번호</label>
                    <input type="text" id="userPassword" name="userPassword" class="form-control form-control-lg border-0 border-bottom rounded-0"
                           placeholder="비밀번호" aria-label="비밀번호">
                </div>

                <!-- 로그인 버튼 -->
                <div class="d-grid mb-4">
                    <button type="submit" class="btn btn-success btn-lg">
                        로그인
                    </button>
                </div>

                <div class="d-flex gap-3">
                    <a href="/emartUser/registerPage" class="text-decoration-none text-secondary small">회원가입</a>
                    <a href="/emartUser/findId" class="text-decoration-none text-secondary small">아이디 찾기</a>
                    <a href="/emartUser/findPw" class="text-decoration-none text-secondary small">비밀번호 찾기</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
