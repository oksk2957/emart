<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAVER 로그인</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light"> <!-- ✅ 전체 배경색을 밝은 회색으로 설정 -->

    <!-- ✅ Flexbox를 사용해 로그인 박스를 화면 수직/수평 중앙에 배치 -->
    <div class="d-flex justify-content-center align-items-center vh-100">

        <!-- ✅ 로그인 폼을 감싸는 박스 -->
        <div class="w-100 p-4 p-md-5 border bg-white rounded-3 shadow" style="max-width: 466px;">
            <!-- w-100: 너비 100%, max-width로 최대 너비 제한 -->
            <!-- p-4 p-md-5: 반응형 패딩 (모바일은 4, 데스크탄은 5) -->
            <!-- border, bg-white, rounded-3, shadow: 테두리, 흰 배경, 둥근 모서리, 그림자 효과 -->





            <!-- ✅ 네이버 로고 영역 -->
            <div class="text-center mb-5">
                <a href="#" target="_blank" class="text-decoration-none">
                    <h3 class="m-0 fw-bold text-success">NAVER</h3>
                    <!-- m-0: 마진 제거, fw-bold: 굵은 글씨, text-success: 초록색 텍스트 -->
                </a>
            </div>

               <!-- ✅ 에러 메시지 표시 (첫 번째 코드 구조 적용) -->
            <div th:if="${errorMessage}" class="alert alert-danger">
                <p th:text="${errorMessage}">에러 메시지</p>
            </div>
            <!-- ✅ 로그인 폼 (Thymeleaf 적용) -->
            <form th:action="@{/emartUser/loginProcess}" 
                  th:method="post">
                
                <!-- 로그인 종류 선택 (체크박스) -->
                <div class="mb-3 form-check">
                    <input type="checkbox" id="sellerChk" class="form-check-input" onclick="selectLogin('seller')">
                    <label for="sellerChk" class="form-check-label">
                        판매자 아이디로 로그인
                    </label>
                </div>
                <!-- ✅ 안내 문구 -->
                <div class="mb-3 text-muted small">
                    이미 네이버 커머스 ID 회원이신가요?
                    <a th:href="@{/emartUser/useTerms}" class="text-decoration-none">
                        판매자ID 로그인하기
                    </a>
                </div>
                <!-- ✅ 아이디 입력 필드 (name="userId" - Backend DTO 매핑) -->
                <div class="mb-3">
                    <label for="userId" class="visually-hidden">아이디</label>
                    <input type="text" 
                           id="userId" 
                           name="userId" 
                           class="form-control form-control-lg border-0 border-bottom rounded-0"
                           placeholder="아이디" 
                           aria-label="아이디"
                           required>
                </div>
                <!-- ✅ 비밀번호 입력 필드 (name="password" - Backend DTO 매핑) -->
                <div class="mb-4">
                    <label for="password" class="visually-hidden">비밀번호</label>
                    <input type="password" 
                           id="password" 
                           name="password" 
                           class="form-control form-control-lg border-0 border-bottom rounded-0"
                           placeholder="비밀번호" 
                           aria-label="비밀번호"
                           required>
                </div>
                <!-- ✅ 로그인 버튼 -->
                <div class="d-grid mb-4">
                    <button type="submit" class="btn btn-success btn-lg">
                        로그인
                    </button>
                </div>
                <!-- ✅ 하단 링크 메뉴 -->
                <div class="d-flex gap-3">
                    <a th:href="@{/emartUser/registerPage}" class="text-decoration-none text-secondary small">회원가입</a>
                    <a th:href="@{/emartUser/findId}" class="text-decoration-none text-secondary small">아이디 찾기</a>
                    <a th:href="@{/emartUser/findPw}" class="text-decoration-none text-secondary small">비밀번호 찾기</a>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
